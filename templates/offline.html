{% extends "base.html" %}
{% block title %}You're Offline - StoryBrain AI{% endblock %}
{% block content %}
<div class="container-site py-16 text-center">
  <div class="max-w-lg mx-auto glass-strong rounded-2xl p-10 md:p-12">
    <div class="w-16 h-16 rounded-full bg-base-content/5 flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-base-content/30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5a8 8 0 0 0 4 15h9a5 5 0 0 0 1.7-.3"/>
        <line x1="1" x2="23" y1="1" y2="23"/>
      </svg>
    </div>
    <h1 class="text-3xl font-bold mb-3">You're Offline</h1>
    <p class="text-base-content/60 mb-8">Please check your internet connection. Cached tools may still be available.</p>
    <div class="w-2 h-2 rounded-full bg-error/70 mx-auto mb-6 animate-pulse"></div>
    <a href="/" class="btn btn-primary rounded-full px-8">Go to Home</a>
  </div>
</div>
{% endblock %}
