{% extends "base.html" %}

{% block title %}Scientific Calculator | StoryBrain AI{% endblock %}

{% block content %}
<div class="max-w-[480px] mx-auto animate-fade-in-up px-2 sm:px-0 mb-10">
    <!-- Header -->
    <div class="text-center mb-6 md:mb-8">
        <h1 class="text-2xl sm:text-3xl font-extrabold mb-2 flex items-center justify-center gap-2">
            <i class="fa-solid fa-flask text-secondary"></i> Scientific Calculator
        </h1>
        <p class="text-sm opacity-80">Advanced mathematical functions at your fingertips.</p>
    </div>

    <!-- Calculator Card -->
    <div class="card bg-base-100 shadow-2xl border border-base-300 overflow-hidden relative">
        <!-- Subtle gradient background -->
        <div class="absolute inset-0 bg-gradient-to-br from-secondary/5 to-accent/5 pointer-events-none"></div>
        
        <div class="card-body p-4 sm:p-5 relative z-10 w-full overflow-hidden">
            <!-- Display -->
            <div class="w-full bg-base-200 rounded-xl p-4 mb-4 shadow-inner text-right border border-base-300">
                <div id="calc-history" class="text-xs sm:text-sm text-base-content/60 min-h-[20px] mb-1 font-mono tracking-wider overflow-hidden text-ellipsis whitespace-nowrap"></div>
                <div id="calc-display" class="text-3xl sm:text-4xl font-bold text-base-content font-mono tracking-tight overflow-hidden text-ellipsis whitespace-nowrap" style="transition: all 0.1s ease-in-out;">0</div>
            </div>

            <!-- Keypad -->
            <div class="grid grid-cols-5 gap-2 sm:gap-2.5">
                
                <!-- Row 1: Scientific/Advanced -->
                <button onclick="calcFunc('sin')" class="btn border-base-300 btn-xs sm:btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">sin</button>
                <button onclick="calcFunc('cos')" class="btn border-base-300 btn-xs sm:btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">cos</button>
                <button onclick="calcFunc('tan')" class="btn border-base-300 btn-xs sm:btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">tan</button>
                <button onclick="calcFunc('sqrt')" class="btn border-base-300 btn-xs sm:btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">&radic;(x)</button>
                <button onclick="setOperator('^')" class="btn border-base-300 btn-xs sm:btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">x<sup>y</sup></button>

                <!-- Row 2: Scientific/Advanced -->
                <button onclick="calcFunc('asin')" class="btn border-base-300 btn-xs sm:btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">sin&sup1;</button>
                <button onclick="calcFunc('acos')" class="btn border-base-300 btn-xs sm:btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">cos&sup1;</button>
                <button onclick="calcFunc('atan')" class="btn border-base-300 btn-xs sm:btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">tan&sup1;</button>
                <button onclick="calcFunc('log')" class="btn border-base-300 btn-xs sm:btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">log</button>
                <button onclick="calcFunc('ln')" class="btn border-base-300 btn-xs sm:btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">ln</button>
                
                <!-- Divider -->
                <div class="col-span-5 h-[1px] bg-base-300 my-1"></div>

                <!-- Row 3: Standard Mix 1 -->
                <button onclick="inputConstant('pi')" class="btn border-base-300 btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">&pi;</button>
                <button onclick="inputConstant('e')" class="btn border-base-300 btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">e</button>
                <button onclick="calcFunc('fact')" class="btn border-base-300 btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">x!</button>
                <button onclick="inputPercent()" class="btn border-base-300 btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">%</button>
                <button onclick="setOperator('/')" class="btn btn-secondary btn-sm hover:brightness-110 active:scale-95 shadow-sm shadow-secondary/20 text-lg">&divide;</button>
                
                <!-- Row 4 -->
                <button onclick="inputDigit('7')" class="btn border-base-300 btn-sm bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm">7</button>
                <button onclick="inputDigit('8')" class="btn border-base-300 btn-sm bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm">8</button>
                <button onclick="inputDigit('9')" class="btn border-base-300 btn-sm bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm">9</button>
                <button onclick="toggleSign()" class="btn border-base-300 btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm">+/-</button>
                <button onclick="setOperator('*')" class="btn btn-secondary btn-sm hover:brightness-110 active:scale-95 shadow-sm shadow-secondary/20 text-lg">&times;</button>
                
                <!-- Row 5 -->
                <button onclick="inputDigit('4')" class="btn border-base-300 btn-sm bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm">4</button>
                <button onclick="inputDigit('5')" class="btn border-base-300 btn-sm bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm">5</button>
                <button onclick="inputDigit('6')" class="btn border-base-300 btn-sm bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm">6</button>
                <button onclick="clearCalc()" class="btn btn-error btn-sm hover:brightness-110 active:scale-95 shadow-sm text-error-content shadow-error/20">AC</button>
                <button onclick="setOperator('-')" class="btn btn-secondary btn-sm hover:brightness-110 active:scale-95 shadow-sm shadow-secondary/20 text-lg">&minus;</button>
                
                <!-- Row 6 -->
                <button onclick="inputDigit('1')" class="btn border-base-300 btn-sm bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm">1</button>
                <button onclick="inputDigit('2')" class="btn border-base-300 btn-sm bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm">2</button>
                <button onclick="inputDigit('3')" class="btn border-base-300 btn-sm bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm">3</button>
                <button onclick="backspace()" class="btn border-base-300 btn-sm bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm"><i class="fa-solid fa-delete-left"></i></button>
                <button onclick="setOperator('+')" class="btn btn-secondary btn-sm hover:brightness-110 active:scale-95 shadow-sm shadow-secondary/20 text-lg">+</button>
                
                <!-- Row 7 -->
                <button onclick="inputDigit('0')" class="btn border-base-300 btn-sm bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm col-span-2">0</button>
                <button onclick="inputDecimal()" class="btn border-base-300 btn-sm bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm">.</button>
                <button onclick="calculateResult()" class="btn btn-primary btn-sm hover:brightness-110 active:scale-95 shadow-sm shadow-primary/20 text-lg col-span-2">=</button>
            </div>
            
            <div class="mt-4 flex justify-between items-center text-xs opacity-50 px-1">
                <span class="font-mono">DEG</span>
                <span>Supports Keyboard</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let displayValue = '0';
    let firstOperand = null;
    let waitingForSecondOperand = false;
    let operator = null;
    let historyStr = '';

    const displayElement = document.getElementById('calc-display');
    const historyElement = document.getElementById('calc-history');

    function updateDisplay(pop = false) {
        // format output length if too long
        let showVal = displayValue;
        if (showVal.length > 15) {
            const num = parseFloat(showVal);
            if (!isNaN(num)) {
                showVal = num.toPrecision(10).replace(/(?:\.0+|(\.\d+?)0+)$/, '$1');
            }
        }
        displayElement.textContent = showVal;
        historyElement.textContent = historyStr;
        if (pop) {
            displayElement.style.transform = 'scale(1.05)';
            displayElement.style.color = 'oklch(var(--s))';
            setTimeout(() => {
                displayElement.style.transform = 'scale(1)';
                displayElement.style.color = '';
            }, 100);
        }
    }

    function inputDigit(digit) {
        if (waitingForSecondOperand) {
            displayValue = digit;
            waitingForSecondOperand = false;
        } else {
            displayValue = displayValue === '0' ? digit : displayValue + digit;
            if (displayValue === '-0') displayValue = '-' + digit;
        }
        updateDisplay();
    }

    function inputDecimal() {
        if (waitingForSecondOperand) {
            displayValue = '0.';
            waitingForSecondOperand = false;
            return updateDisplay();
        }
        if (!displayValue.includes('.')) {
            displayValue += '.';
        }
        updateDisplay();
    }

    function inputConstant(type) {
        const val = type === 'pi' ? Math.PI : Math.E;
        if (waitingForSecondOperand) {
            displayValue = String(val);
            waitingForSecondOperand = false;
        } else {
            displayValue = String(val);
        }
        updateDisplay();
    }

    function setOperator(nextOperator) {
        const inputValue = parseFloat(displayValue);

        if (operator && waitingForSecondOperand) {
            operator = nextOperator;
            historyStr = historyStr.replace(/[+\-*/^]$/, operator);
            updateDisplay();
            return;
        }

        if (firstOperand == null && !isNaN(inputValue)) {
            firstOperand = inputValue;
        } else if (operator) {
            const result = calculate(firstOperand, inputValue, operator);
            displayValue = `${parseFloat(result.toFixed(12))}`;
            firstOperand = parseFloat(result.toFixed(12));
        }

        waitingForSecondOperand = true;
        operator = nextOperator;
        const opSymbol = nextOperator === '*' ? '×' : nextOperator === '/' ? '÷' : nextOperator === '+' ? '+' : nextOperator === '-' ? '−' : '^';
        historyStr = `${firstOperand} ${opSymbol} `;
        updateDisplay();
    }

    function calculate(first, second, op) {
        if (op === '+') return first + second;
        if (op === '-') return first - second;
        if (op === '*') return first * second;
        if (op === '/') return second === 0 ? NaN : first / second;
        if (op === '^') return Math.pow(first, second);
        return second;
    }

    function calcFunc(func) {
        if (displayValue === 'Error' || isNaN(displayValue)) return;
        const val = parseFloat(displayValue);
        let res = val;
        let funcName = '';
        
        switch (func) {
            case 'sin': res = Math.sin(val * Math.PI / 180); funcName = 'sin'; break; // DEG
            case 'cos': res = Math.cos(val * Math.PI / 180); funcName = 'cos'; break; // DEG
            case 'tan': res = Math.tan(val * Math.PI / 180); funcName = 'tan'; break; // DEG
            case 'asin': res = Math.asin(val) * 180 / Math.PI; funcName = 'asin'; break; // returns DEG
            case 'acos': res = Math.acos(val) * 180 / Math.PI; funcName = 'acos'; break; // returns DEG
            case 'atan': res = Math.atan(val) * 180 / Math.PI; funcName = 'atan'; break; // returns DEG
            case 'log': res = Math.log10(val); funcName = 'log'; break;
            case 'ln': res = Math.log(val); funcName = 'ln'; break;
            case 'sqrt': res = Math.sqrt(val); funcName = '√'; break;
            case 'fact': 
                if (val < 0 || !Number.isInteger(val)) { res = NaN; }
                else {
                    let f = 1; for(let i = 2; i <= val; i++) f *= i;
                    res = f;
                }
                funcName = 'fact'; break;
        }

        if (isNaN(res)) {
            displayValue = "Error";
            historyStr = '';
        } else {
            // format slight precision errors like sin(180) != 0
            if (Math.abs(res) < 1e-10) res = 0;
            displayValue = `${parseFloat(res.toFixed(12))}`;
            if (waitingForSecondOperand && firstOperand !== null) {
                // user clicked function on second operand before equals
            } else {
                historyStr = `${funcName}(${val}) =`;
                firstOperand = null;
                operator = null;
                waitingForSecondOperand = true;
            }
        }
        updateDisplay(true);
    }

    function calculateResult() {
        if (!operator || waitingForSecondOperand) return;
        const inputValue = parseFloat(displayValue);
        const result = calculate(firstOperand, inputValue, operator);
        
        if (isNaN(result) || !isFinite(result)) {
            displayValue = "Error";
            historyStr = '';
        } else {
            historyStr += `${displayValue} =`;
            displayValue = `${parseFloat(result.toFixed(12))}`;
        }
        
        firstOperand = null;
        operator = null;
        waitingForSecondOperand = true;
        updateDisplay(true);
    }

    function clearCalc() {
        displayValue = '0';
        firstOperand = null;
        waitingForSecondOperand = false;
        operator = null;
        historyStr = '';
        updateDisplay();
    }
    
    function backspace() {
        if (waitingForSecondOperand || displayValue === 'Error') return;
        displayValue = displayValue.length > 1 ? displayValue.slice(0, -1) : '0';
        if (displayValue === '-') displayValue = '0';
        updateDisplay();
    }

    function toggleSign() {
        if (displayValue === '0' || displayValue === '0.' || displayValue === 'Error') return;
        displayValue = displayValue.charAt(0) === '-' ? displayValue.slice(1) : '-' + displayValue;
        updateDisplay();
    }

    function inputPercent() {
        if (displayValue === 'Error') return;
        const value = parseFloat(displayValue);
        displayValue = `${value / 100}`;
        updateDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', (event) => {
        if (event.key >= '0' && event.key <= '9') inputDigit(event.key);
        if (event.key === '.') inputDecimal();
        if (event.key === '=' || event.key === 'Enter') {
            event.preventDefault();
            calculateResult();
        }
        if (event.key === 'Backspace') backspace();
        if (event.key === 'Escape') clearCalc();
        if (['+', '-', '*', '/', '^'].includes(event.key)) setOperator(event.key);
    });
</script>
{% endblock %}
