{% extends "base.html" %}

{% block title %}Password Generator | StoryBrain AI{% endblock %}

{% block content %}
<!-- Back breadcrumb -->
<div class="mb-6 animate-fade-in-up">
    <a href="/" class="inline-flex items-center gap-2 text-sm font-medium text-base-content/50 hover:text-primary transition-colors duration-200">
        <i class="fa-solid fa-arrow-left text-xs"></i> All Tools
    </a>
</div>
<div class="max-w-2xl mx-auto animate-fade-in-up px-2 sm:px-0">
    <!-- Header -->
    <div class="text-center mb-8 md:mb-12">
        <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold mb-3 flex items-center justify-center gap-2 sm:gap-3">
            <i class="fa-solid fa-key text-accent"></i> Password Generator
        </h1>
        <p class="text-sm sm:text-base md:text-lg opacity-80 px-4">Create strong and secure passwords instantly.</p>
    </div>

    <div class="card bg-base-100 shadow-xl border border-base-300">
        <div class="card-body p-4 sm:p-6 md:p-8">
            <!-- Password Display -->
            <div class="bg-base-300 rounded-xl p-3 sm:p-4 flex items-center justify-between mb-6 sm:mb-8 group relative overflow-hidden transition-all duration-300" id="displayContainer">
                <div id="passwordDisplay" class="font-mono text-lg sm:text-xl md:text-2xl text-accent break-all tracking-wider z-10 w-[85%] font-bold">
                    Click Generate
                </div>
                <button onclick="copyPassword()" class="btn btn-circle btn-ghost btn-sm sm:btn-md text-base-content hover:text-accent z-10 tooltip tooltip-left" data-tip="Copy">
                    <i class="fa-regular fa-copy text-lg sm:text-xl copy-icon"></i>
                </button>
            </div>

            <!-- Controls -->
            <div class="space-y-5 sm:space-y-6">
                <!-- Length Slider -->
                <div class="px-1 sm:px-2">
                    <div class="flex justify-between mb-3 text-sm sm:text-base">
                        <label class="font-semibold">Password Length</label>
                        <span id="lengthValue" class="font-bold text-accent text-lg">16</span>
                    </div>
                    <input type="range" min="8" max="64" value="16" class="range range-accent range-sm sm:range-md w-full" id="lengthSlider" oninput="document.getElementById('lengthValue').innerText = this.value; generatePassword();" />
                </div>

                <!-- Options -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                    <label class="cursor-pointer label justify-start gap-4 bg-base-200 p-3 sm:p-4 rounded-xl border border-transparent hover:border-accent/40 transition-colors active:scale-[0.98]">
                        <input type="checkbox" id="incUppercase" class="checkbox checkbox-accent checkbox-sm sm:checkbox-md" checked onchange="generatePassword()" />
                        <span class="label-text font-medium text-sm sm:text-base">Uppercase (A-Z)</span>
                    </label>
                    <label class="cursor-pointer label justify-start gap-4 bg-base-200 p-3 sm:p-4 rounded-xl border border-transparent hover:border-accent/40 transition-colors active:scale-[0.98]">
                        <input type="checkbox" id="incLowercase" class="checkbox checkbox-accent checkbox-sm sm:checkbox-md" checked onchange="generatePassword()" />
                        <span class="label-text font-medium text-sm sm:text-base">Lowercase (a-z)</span>
                    </label>
                    <label class="cursor-pointer label justify-start gap-4 bg-base-200 p-3 sm:p-4 rounded-xl border border-transparent hover:border-accent/40 transition-colors active:scale-[0.98]">
                        <input type="checkbox" id="incNumbers" class="checkbox checkbox-accent checkbox-sm sm:checkbox-md" checked onchange="generatePassword()" />
                        <span class="label-text font-medium text-sm sm:text-base">Numbers (0-9)</span>
                    </label>
                    <label class="cursor-pointer label justify-start gap-4 bg-base-200 p-3 sm:p-4 rounded-xl border border-transparent hover:border-accent/40 transition-colors active:scale-[0.98]">
                        <input type="checkbox" id="incSymbols" class="checkbox checkbox-accent checkbox-sm sm:checkbox-md" checked onchange="generatePassword()" />
                        <span class="label-text font-medium text-sm sm:text-base">Symbols (@#$%)</span>
                    </label>
                </div>

                <button onclick="generatePassword(true)" class="btn btn-accent w-full mt-2 sm:mt-4 shadow-lg shadow-accent/30 text-base sm:text-lg h-12 sm:h-14">
                    <i class="fa-solid fa-bolt mr-2"></i> Generate Password
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const upperMap = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const lowerMap = "abcdefghijklmnopqrstuvwxyz";
const numMap = "0123456789";
const symMap = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

function generatePassword(animate = false) {
    const length = parseInt(document.getElementById('lengthSlider').value);
    const incUpper = document.getElementById('incUppercase').checked;
    const incLower = document.getElementById('incLowercase').checked;
    const incNum = document.getElementById('incNumbers').checked;
    const incSym = document.getElementById('incSymbols').checked;

    let charset = "";
    if (incUpper) charset += upperMap;
    if (incLower) charset += lowerMap;
    if (incNum) charset += numMap;
    if (incSym) charset += symMap;

    const display = document.getElementById('passwordDisplay');
    const container = document.getElementById('displayContainer');
    
    if (charset === "") {
        display.innerText = "Select at least one option!";
        display.classList.remove('text-accent');
        display.classList.add('text-error', 'text-sm', 'sm:text-lg');
        container.classList.add('border', 'border-error/50');
        return;
    }
    
    display.classList.remove('text-sm', 'sm:text-lg');
    container.classList.remove('border', 'border-error/50');

    let password = "";
    for (let i = 0; i < length; i++) {
        const randomIndex = Math.floor(Math.random() * charset.length);
        password += charset[randomIndex];
    }

    display.innerText = password;
    display.classList.remove('text-error');
    display.classList.add('text-accent');
    
    // Add pop animation
    if(animate) {
        container.classList.add('scale-[1.02]', 'bg-base-200');
        setTimeout(() => {
            container.classList.remove('scale-[1.02]', 'bg-base-200');
        }, 200);
    }
}

function copyPassword() {
    const pwd = document.getElementById('passwordDisplay').innerText;
    if (pwd && pwd !== "Click Generate" && pwd !== "Select at least one option!") {
        navigator.clipboard.writeText(pwd);
        
        // Visual feedback
        const btn = document.querySelector('.copy-icon');
        btn.classList.remove('fa-copy', 'fa-regular');
        btn.classList.add('fa-check', 'fa-solid', 'text-success', 'scale-125');
        
        const container = document.getElementById('displayContainer');
        container.classList.add('ring', 'ring-success/50');
        
        setTimeout(() => {
            btn.classList.remove('fa-check', 'fa-solid', 'text-success', 'scale-125');
            btn.classList.add('fa-copy', 'fa-regular');
            container.classList.remove('ring', 'ring-success/50');
        }, 1500);
    }
}

// Generate one on load
document.addEventListener('DOMContentLoaded', () => generatePassword(false));
</script>
{% endblock %}
