{% extends "base.html" %}
{% block title %}Contact Us | StoryBrain AI{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8 animate-fade-in-up">
    <h1 class="text-3xl md:text-4xl font-bold mb-6 text-center">Contact Us</h1>
    <p class="text-center opacity-80 mb-8">Have a question or a feature request? Let us know!</p>
    
    <div class="card bg-base-100 shadow-xl border border-base-300">
        <div class="card-body p-6 md:p-8">
            <form class="space-y-6" onsubmit="event.preventDefault(); document.getElementById('successAlert').classList.remove('hidden'); this.reset();">
                <div class="form-control w-full">
                    <label class="label"><span class="label-text font-semibold">Your Name</span></label>
                    <input type="text" placeholder="John Doe" class="input input-bordered w-full text-base focus:input-primary" required />
                </div>
                <div class="form-control w-full">
                    <label class="label"><span class="label-text font-semibold">Email Address</span></label>
                    <input type="email" placeholder="john@example.com" class="input input-bordered w-full text-base focus:input-primary" required />
                </div>
                <div class="form-control w-full">
                    <label class="label"><span class="label-text font-semibold">Message</span></label>
                    <textarea placeholder="How can we help?" class="textarea textarea-bordered h-32 text-base focus:textarea-primary" required></textarea>
                </div>
                
                <div id="successAlert" class="alert alert-success mt-4 hidden shadow-sm animate-fade-in-up">
                    <i class="fa-solid fa-circle-check"></i>
                    <span>Thanks for reaching out! We will get back to you soon.</span>
                </div>
                
                <button type="submit" class="btn btn-primary w-full shadow-lg shadow-primary/30 text-lg h-14">Send Message</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
