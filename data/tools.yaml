    - q: What is compound interest?
      a: Compound interest is interest calculated on the initial principal plus all accumulated interest from previous periods.
        Your money grows faster over time because you earn interest on your interest — this is called the snowball effect.
    - q: How often should I compound my investments?
      a: Higher compounding frequency means faster growth. Monthly compounding earns more than annual, and daily earns more
        than monthly. Most savings accounts compound daily, while investments like FDs may compound quarterly or annually.
    - q: What is the difference between simple and compound interest?
      a: Simple interest is calculated only on the principal amount every year. Compound interest is calculated on the principal
        plus all interest already earned. Over 10 years at 8%, $10,000 earns $8,000 with simple interest but $11,589 with
        monthly compound interest.
    - q: Can I add monthly contributions?
      a: Yes. Enter a monthly contribution amount and the calculator adds it each month before applying interest. Regular
        contributions dramatically boost your total value — try comparing $0 vs $500/month to see the difference.
