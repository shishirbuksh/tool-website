        desc: Review readability scores, the quality grade, and tone estimate. Each metric includes a plain-English interpretation.
      - title: Export Your Report
        desc: Download the full analysis report as PDF for documentation or sharing.
    howto_calculate: '<p>The Writing Quality Analyzer computes multiple metrics entirely in your browser. <strong>Readability</strong> uses three standard formulas: Flesch-Kincaid Grade Level (FKGL = 0.39 × avg words/sentence + 11.8 × avg syllables/word − 15.59), Flesch Reading Ease (FRE = 206.835 − 1.015 × avg words/sentence − 84.6 × avg syllables/word), and Gunning Fog Index (Fog = 0.4 × (avg words/sentence + percent complex words)). <strong>Passive voice</strong> is detected using regex patterns for forms of "to be" followed by past participle verbs. <strong>Adverb density</strong> counts -ly words per 100 words. <strong>Complex words</strong> are those with 3 or more syllables. <strong>Tone analysis</strong> uses weighted keyword dictionaries for formal, casual, positive, negative, and persuasive categories. <strong>Quality Grade</strong> combines readability (30%), sentence variety (20%), passive voice penalty (15%), adverb density penalty (15%), and complex word ratio (20%) into a weighted 0-100 score mapped to A-F.</p>'
    about_title: About the AI Writing Quality Analyzer
    about_body: "<p>The AI Writing Quality Analyzer is a free online tool that gives you a comprehensive diagnostic of your writing quality — all in your browser. It analyzes your text across six key dimensions: readability, passive voice usage, adverb density, complex word frequency, sentence length variety, and writing tone.</p><p>In addition to numerical scores (FKGL, FRE, Fog Index), the tool visually highlights issues directly in your text using a color-coded annotation system. Purple highlights indicate passive voice constructions, orange shows adverb overuse, red marks complex words, and yellow flags run-on sentences. Click any highlight to see why it matters and how to fix it.</p><p>Each metric includes a plain-English interpretation so you can understand what the numbers mean for your readers. The Quality Grade (A through F) combines all metrics into a single at-a-glance score. Tone analysis estimates whether your writing reads as formal, casual, persuasive, positive, or negative.</p><p>Built with privacy in mind, all processing happens directly in your browser. No sign-up required, no data stored, no tracking. For complementary writing tools, try our <a href='/tool/paraphrasing-tool'>AI Paraphrasing Tool</a> and <a href='/tool/text-summarizer'>AI Text Summarizer</a>.</p>"
