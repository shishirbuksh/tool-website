      - q: Is my data safe when using Instagram Calculator?
        a: Absolutely. All calculations happen locally in your browser. Your data
          never touches any server and is never stored or tracked.
      - q: What is engagement rate on Instagram?
        a: Engagement rate is the percentage of your followers who interact with your
          posts. It is calculated by dividing total likes and comments by your follower
          count, then times 100. A rate above 3% is good, above 5% is excellent.
      - q: How is estimated earnings per post calculated?
        a: 'Estimated earnings are based on your engagement level. Higher engagement
          means more value to sponsors. The tool estimates earnings at different tiers:
          excellent engagement earns the most per post, while low engagement earns
          less.'
      - q: What is a good story view rate?
        a: Story view rate is your average story views divided by followers. A rate
          above 5% is good, above 10% is excellent. Low story views may mean your
          stories need more interactive elements like polls and questions.
      - q: What is the like-to-comment ratio?
        a: "The like-to-comment ratio shows how many likes you get per comment. A\
          \ lower ratio (e.g. 10:1 or less) means more people are commenting \xE2\u20AC\
          \u201D which signals deep engagement. High ratios (50:1+) suggest content\
          \ that gets passive likes but not conversations."
      - q: How does the follower growth projection work?
        a: The tool projects your follower count at 1, 3, 6, and 12 months based on
          your weekly follower growth rate. It shows a visual bar chart comparing
          current vs projected numbers so you can see your growth trajectory.
      - q: What is the What-If Simulator?
        a: "The simulator lets you test different scenarios like doubling your likes\
          \ or followers. Click any scenario button to instantly see how that change\
          \ would affect all your metrics \xE2\u20AC\u201D useful for setting growth\
          \ targets."
      - q: Is my data saved between visits?
        a: Yes, your calculation history is saved in your browser's local storage.
          You can click any history entry to restore it, or clear history at any time.
          Your actual numbers never leave your device.
