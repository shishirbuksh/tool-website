  color-contrast-checker:
    name: Color Contrast Checker
    icon: contrast
    category: Developer & SEO
    description: Check WCAG contrast ratios and APCA contrast between any two colors — pass/fail AA and AAA with color blindness simulation, HSL fine-tuning, and batch matrix. Free online accessibility checker.
    meta_title: "Free Color Contrast Checker — WCAG & APCA Accessibility Checker Online | StoryBrain AI"
    keywords:
      - free color contrast checker online
      - wcag contrast checker tool
      - website accessibility checker
