    - q: What is Keyword Difficulty?
      a: Keyword Difficulty (0-100) estimates how hard it is to rank for a keyword in search results. Low (0-30) means easy
        to rank, Medium (31-60) requires solid content, High (61-80) is challenging, and Very High (81-100) is extremely competitive.
    - q: How is Traffic Potential calculated?
      a: Traffic Potential is estimated as Monthly Search Volume multiplied by the expected Click-Through Rate (CTR). Higher
        difficulty keywords get lower estimated CTR because top-ranking results dominate the clicks.
    - q: What does the Opportunity Score mean?
      a: The Opportunity Score (0-100%) combines keyword difficulty and competition level into a single metric. A score of
        70% or higher means the keyword is highly recommended — good search volume with manageable competition. Below 40%
        means it may be difficult to break into.
