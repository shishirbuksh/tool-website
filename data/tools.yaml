      a: Story view rate is your average story views divided by followers. A rate above 5% is good, above 10% is excellent.
        Low story views may mean your stories need more interactive elements like polls and questions.
    - q: What is the like-to-comment ratio?
      a: The like-to-comment ratio shows how many likes you get per comment. A lower ratio (e.g. 10:1 or less) means more
        people are commenting — which signals deep engagement. High ratios (50:1+) suggest content that gets passive likes
        but not conversations.
    - q: How does the follower growth projection work?
      a: The tool projects your follower count at 1, 3, 6, and 12 months based on your weekly follower growth rate. It shows
        a visual bar chart comparing current vs projected numbers so you can see your growth trajectory.
