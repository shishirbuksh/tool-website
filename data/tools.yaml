      - q: What is the difference between exclusive and inclusive GST?
        a: "Exclusive GST means the amount entered is before tax \xE2\u20AC\u201D\
          \ GST is added on top. Inclusive GST means the amount entered already includes\
          \ tax \xE2\u20AC\u201D GST is extracted to find the base price."
      - q: What is the difference between CGST+SGST and IGST?
        a: CGST (Central GST) and SGST (State GST) apply to intra-state transactions
          (within the same state), split equally. IGST (Integrated GST) applies to
          inter-state transactions (across states), collected as a single tax.
      - q: What GST slabs are available in India?
        a: 'India has six main GST slabs: 0% (essential goods), 3% (gold/diamond),
          5% (basic necessities), 12% (standard goods), 18% (majority of goods/services),
          and 28% (luxury/demerit goods).'
      - q: Can I use a custom GST rate?
        a: Yes, click the Custom button and enter any rate. This is useful for special
          rates or non-Indian GST calculations.
      - q: How does the Invoice Itemizer work?
        a: Add multiple items with different prices, quantities, and GST rates. The
          itemizer calculates the taxable value, total GST, and grand total for the
          entire invoice.
