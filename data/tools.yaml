      - q: Why does my preview look different from what I expected?
        a: >-
          Each platform caches link previews. After fixing missing tags, use
          each platform's official debugger (Facebook Sharing Debugger, Twitter
          Card Validator, LinkedIn Post Inspector) to force a refresh of their
          cache.
      - q: What meta tags are required for a good social card?
        a: >-
          At minimum you need og:title, og:description, og:image (1200x630),
          og:url, and twitter:card. For best results, also include og:site_name,
          og:locale, and twitter:site.
      - q: Why can't the tool fetch some URLs?
        a: >-
          Some sites block automated requests, require authentication, or use
          JavaScript rendering. The tool fetches raw HTML only — if a page
          relies entirely on JavaScript to inject meta tags, those tags won't
          be detected.
      - q: What are the character limits for social cards?
        a: >-
          Twitter: title 70 chars, description 200 chars. Facebook: title 60-100
          chars, description 150-200 chars. LinkedIn: title 100 chars,
          description 200 chars. WhatsApp shows up to 50 chars of the URL,
          title, and description with no hard limit.
      - q: Is the URL I submit stored anywhere?
