      - q: What is a good readability score?
        a: For most general audiences, aim for a Flesch Reading Ease score of 60-70 (Standard) and a FKGL of 7-8. Higher FRE means easier reading. Lower FKGL means the text is understandable by younger readers.
      - q: What does the Quality Grade mean?
