      - q: How does the calculator model retirement?
        a: It uses two phases — an accumulation phase where contributions and compound growth build your nest egg, and a drawdown phase where monthly withdrawals reduce the balance while remaining funds continue to grow.
      - q: What is contribution escalation?
        a: Contribution escalation lets you specify a yearly percentage increase to your monthly deposits, modeling expected salary increases over your career.
