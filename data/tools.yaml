    - q: What is engagement rate on Instagram?
      a: Engagement rate is the percentage of your followers who interact with your posts. It is calculated by dividing total
        likes and comments by your follower count, then times 100. A rate above 3% is good, above 5% is excellent.
    - q: How is estimated earnings per post calculated?
      a: 'Estimated earnings are based on your engagement level. Higher engagement means more value to sponsors. The tool
        estimates earnings at different tiers: excellent engagement earns the most per post, while low engagement earns less.'
