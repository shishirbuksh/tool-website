          limits. No sign-up or account required.
      - q: How accurate are the results?
        a: The Burn Rate Calculator uses standard mathematical formulas to ensure
          accurate results. Always double-check critical calculations.
      - q: Is my data safe when using Burn Rate Calculator?
        a: Absolutely. All calculations happen locally in your browser. Your data
          never touches any server and is never stored or tracked.
      - q: What is burn rate for a startup?
        a: Burn rate is how fast a startup spends its cash each month. Gross burn
          is total monthly expenses. Net burn is expenses minus monthly revenue. It
          shows how efficiently a startup manages its money.
      - q: What is the difference between gross and net burn rate?
        a: Gross burn is your total monthly spending on all expenses. Net burn is
          what you actually lose each month after subtracting revenue from expenses.
          Net burn determines how many months your cash will last.
      - q: How is cash runway calculated?
        a: Runway = current cash balance divided by net monthly burn. For example,
          $500,000 cash with $25,000 net monthly burn gives 20 months of runway. If
          revenue covers all expenses, net burn is zero and runway is infinite.
      - q: What is a healthy burn rate?
        a: A healthy burn rate depends on your stage. Early startups should have 12-18
          months of runway. Later-stage startups with revenue should aim to reduce
          net burn over time and work toward profitability. A burn rate above 50%
          of cash per year is generally risky.
