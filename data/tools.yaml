    - q: What is customer acquisition cost (CAC)?
      a: CAC is the total cost to acquire a new customer. Add all marketing and sales costs for a period, then divide by the
        number of new customers gained. It tells you how much you spend on average to win each customer.
    - q: What is a good LTV:CAC ratio?
      a: A ratio above 3:1 is considered healthy. Between 1:1 and 3:1 means you are acquiring customers profitably but have
        room to improve. Below 1:1 means you spend more to acquire a customer than they will ever pay you — which is unsustainable.
    - q: How is CAC payback period calculated?
      a: CAC payback = blended CAC divided by average monthly revenue per customer. It shows how many months it takes to earn
        back what you spent acquiring each customer. A payback under 12 months is good for most SaaS businesses.
