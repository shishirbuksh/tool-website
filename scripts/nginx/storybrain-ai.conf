# CloudPanel Vhost Configuration for storybrainai.com
# Optimized for 100/100 Core Web Vitals (FastAPI/Uvicorn)

server {
    listen 80;
    listen [::]:80;
    listen 443 quic;
    listen 443 ssl;
    listen [::]:443 quic;
    listen [::]:443 ssl;
    http2 on;
    http3 on; # Enable HTTP/3 (QUIC) for minimum latency
    
    {{ssl_certificate_key}}
    {{ssl_certificate}}
    server_name storybrainai.com;
    return 301 https://www.storybrainai.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    listen 443 quic;
    listen 443 ssl;
    listen [::]:443 quic;
    listen [::]:443 ssl;
    http2 on;
    http3 on; # Enable HTTP/3
    
    {{ssl_certificate_key}}
    {{ssl_certificate}}
    server_name www.storybrainai.com;

    # Document Root (Not strictly used for FastAPI but required by CloudPanel)
    root /home/storybrainai/htdocs/www.storybrainai.com;

    # Security Headers (Phase 10)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Alt-Svc 'h3=":443"; ma=86400'; # Announce HTTP/3

    # Enable Compression (Phase 11)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Cache Static Assets (Phase 2 & 11)
    location /static/ {
        alias /home/storybrainai/htdocs/www.storybrainai.com/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Proxy to FastAPI / Gunicorn backend
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Websocket support (if needed for background tasks)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}
