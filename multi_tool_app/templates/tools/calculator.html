{% extends "base.html" %}

{% block title %}Calculator | StoryBrain AI{% endblock %}

{% block content %}
<div class="max-w-[360px] mx-auto animate-fade-in-up px-2 sm:px-0">
    <!-- Header -->
    <div class="text-center mb-6 md:mb-8">
        <h1 class="text-2xl sm:text-3xl font-extrabold mb-2 flex items-center justify-center gap-2">
            <i class="fa-solid fa-calculator text-primary"></i> Standard Calculator
        </h1>
        <p class="text-sm opacity-80">A fast, beautiful everyday calculator.</p>
    </div>

    <!-- Calculator Card -->
    <div class="card bg-base-100 shadow-2xl border border-base-300 overflow-hidden relative">
        <!-- Subtle gradient background -->
        <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-secondary/5 pointer-events-none"></div>
        
        <div class="card-body p-4 sm:p-5 relative z-10">
            <!-- Display -->
            <div class="w-full bg-base-200 rounded-xl p-4 mb-4 shadow-inner text-right border border-base-300">
                <div id="calc-history" class="text-xs sm:text-sm text-base-content/60 min-h-[20px] mb-1 font-mono tracking-wider overflow-hidden text-ellipsis whitespace-nowrap"></div>
                <div id="calc-display" class="text-3xl sm:text-4xl font-bold text-base-content font-mono tracking-tight overflow-hidden text-ellipsis whitespace-nowrap" style="transition: all 0.1s ease-in-out;">0</div>
            </div>

            <!-- Keypad -->
            <div class="grid grid-cols-4 gap-2 sm:gap-3">
                <!-- Row 1 -->
                <button onclick="clearCalc()" class="btn btn-error btn-sm sm:btn-md grid-cols-1 hover:brightness-110 active:scale-95 shadow-sm text-error-content shadow-error/20 flex flex-col justify-center items-center">AC</button>
                <button onclick="toggleSign()" class="btn border-base-300 btn-sm sm:btn-md bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm flex flex-col justify-center items-center">+/-</button>
                <button onclick="inputPercent()" class="btn border-base-300 btn-sm sm:btn-md bg-base-200 hover:bg-base-300 active:scale-95 shadow-sm flex flex-col justify-center items-center">%</button>
                <button onclick="setOperator('/')" class="btn btn-primary btn-sm sm:btn-md hover:brightness-110 active:scale-95 shadow-sm shadow-primary/20 text-lg flex flex-col justify-center items-center">&divide;</button>
                
                <!-- Row 2 -->
                <button onclick="inputDigit('7')" class="btn border-base-300 btn-sm sm:btn-md bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm flex flex-col justify-center items-center">7</button>
                <button onclick="inputDigit('8')" class="btn border-base-300 btn-sm sm:btn-md bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm flex flex-col justify-center items-center">8</button>
                <button onclick="inputDigit('9')" class="btn border-base-300 btn-sm sm:btn-md bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm flex flex-col justify-center items-center">9</button>
                <button onclick="setOperator('*')" class="btn btn-primary btn-sm sm:btn-md hover:brightness-110 active:scale-95 shadow-sm shadow-primary/20 text-lg flex flex-col justify-center items-center">&times;</button>
                
                <!-- Row 3 -->
                <button onclick="inputDigit('4')" class="btn border-base-300 btn-sm sm:btn-md bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm flex flex-col justify-center items-center">4</button>
                <button onclick="inputDigit('5')" class="btn border-base-300 btn-sm sm:btn-md bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm flex flex-col justify-center items-center">5</button>
                <button onclick="inputDigit('6')" class="btn border-base-300 btn-sm sm:btn-md bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm flex flex-col justify-center items-center">6</button>
                <button onclick="setOperator('-')" class="btn btn-primary btn-sm sm:btn-md hover:brightness-110 active:scale-95 shadow-sm shadow-primary/20 text-lg flex flex-col justify-center items-center">&minus;</button>
                
                <!-- Row 4 -->
                <button onclick="inputDigit('1')" class="btn border-base-300 btn-sm sm:btn-md bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm flex flex-col justify-center items-center">1</button>
                <button onclick="inputDigit('2')" class="btn border-base-300 btn-sm sm:btn-md bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm flex flex-col justify-center items-center">2</button>
                <button onclick="inputDigit('3')" class="btn border-base-300 btn-sm sm:btn-md bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm flex flex-col justify-center items-center">3</button>
                <button onclick="setOperator('+')" class="btn btn-primary btn-sm sm:btn-md hover:brightness-110 active:scale-95 shadow-sm shadow-primary/20 text-lg flex flex-col justify-center items-center">+</button>
                
                <!-- Row 5 -->
                <button onclick="inputDigit('0')" class="btn border-base-300 btn-sm sm:btn-md bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm col-span-2 flex flex-col justify-center items-center">0</button>
                <button onclick="inputDecimal()" class="btn border-base-300 btn-sm sm:btn-md bg-base-100 hover:bg-base-200 text-lg active:scale-95 shadow-sm flex flex-col justify-center items-center">.</button>
                <button onclick="calculateResult()" class="btn btn-secondary btn-sm sm:btn-md hover:brightness-110 active:scale-95 shadow-sm shadow-secondary/20 text-lg flex flex-col justify-center items-center">=</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let displayValue = '0';
    let firstOperand = null;
    let waitingForSecondOperand = false;
    let operator = null;
    let historyStr = '';

    const displayElement = document.getElementById('calc-display');
    const historyElement = document.getElementById('calc-history');

    function updateDisplay(pop = false) {
        displayElement.textContent = displayValue;
        historyElement.textContent = historyStr;
        if (pop) {
            displayElement.style.transform = 'scale(1.05)';
            displayElement.style.color = 'oklch(var(--s))';
            setTimeout(() => {
                displayElement.style.transform = 'scale(1)';
                displayElement.style.color = '';
            }, 100);
        }
    }

    function inputDigit(digit) {
        if (waitingForSecondOperand) {
            displayValue = digit;
            waitingForSecondOperand = false;
        } else {
            displayValue = displayValue === '0' ? digit : displayValue + digit;
        }
        updateDisplay();
    }

    function inputDecimal() {
        if (waitingForSecondOperand) {
            displayValue = '0.';
            waitingForSecondOperand = false;
            return updateDisplay();
        }
        if (!displayValue.includes('.')) {
            displayValue += '.';
        }
        updateDisplay();
    }

    function setOperator(nextOperator) {
        const inputValue = parseFloat(displayValue);

        if (operator && waitingForSecondOperand) {
            operator = nextOperator;
            historyStr = historyStr.replace(/[+\-*/]$/, operator);
            updateDisplay();
            return;
        }

        if (firstOperand == null && !isNaN(inputValue)) {
            firstOperand = inputValue;
        } else if (operator) {
            const result = calculate(firstOperand, inputValue, operator);
            displayValue = `${parseFloat(result.toFixed(10))}`;
            firstOperand = parseFloat(result.toFixed(10));
        }

        waitingForSecondOperand = true;
        operator = nextOperator;
        const opSymbol = nextOperator === '*' ? '×' : nextOperator === '/' ? '÷' : nextOperator === '+' ? '+' : '−';
        historyStr = `${firstOperand} ${opSymbol} `;
        updateDisplay();
    }

    function calculate(first, second, op) {
        if (op === '+') return first + second;
        if (op === '-') return first - second;
        if (op === '*') return first * second;
        if (op === '/') return second === 0 ? 'Error' : first / second;
        return second;
    }

    function calculateResult() {
        if (!operator || waitingForSecondOperand) return;
        const inputValue = parseFloat(displayValue);
        const result = calculate(firstOperand, inputValue, operator);
        
        historyStr += `${displayValue} =`;
        displayValue = `${parseFloat(result.toFixed(10))}`;
        
        firstOperand = null;
        operator = null;
        waitingForSecondOperand = true;
        updateDisplay(true);
    }

    function clearCalc() {
        displayValue = '0';
        firstOperand = null;
        waitingForSecondOperand = false;
        operator = null;
        historyStr = '';
        updateDisplay();
    }

    function toggleSign() {
        if (displayValue === '0' || displayValue === 'Error') return;
        displayValue = displayValue.charAt(0) === '-' ? displayValue.slice(1) : '-' + displayValue;
        updateDisplay();
    }

    function inputPercent() {
        if (displayValue === 'Error') return;
        const value = parseFloat(displayValue);
        displayValue = `${value / 100}`;
        updateDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', (event) => {
        if (event.key >= '0' && event.key <= '9') inputDigit(event.key);
        if (event.key === '.') inputDecimal();
        if (event.key === '=' || event.key === 'Enter') {
            event.preventDefault();
            calculateResult();
        }
        if (event.key === 'Backspace') {
            displayValue = displayValue.length > 1 ? displayValue.slice(0, -1) : '0';
            updateDisplay();
        }
        if (event.key === 'Escape') clearCalc();
        if (['+', '-', '*', '/'].includes(event.key)) setOperator(event.key);
    });
</script>
{% endblock %}
